<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Miro</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-line"></div>
        <div class="navbar-content">
            <a href="index.html" class="nav-logo">
                <img class="nav-logo-img" src="assets/logo.png" alt="Miro logo">
                <span class="nav-logo-text">miro</span>
            </a>
            <div class="nav-right">
                <a href="login.html" class="nav-cta-btn--outline">Log In</a>
            </div>
        </div>
    </nav>

    <section class="auth-page">
        <div class="auth-card">
            <h1 class="auth-card-title">Create your account</h1>
            <p class="auth-card-subtitle">Start recovering abandoned carts today</p>
            <div id="auth-error" class="auth-error" style="display:none;"></div>
            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label" for="orgName">Organization name</label>
                    <input class="form-input" type="text" id="orgName" required placeholder="Your store or company name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" required minlength="8" placeholder="Minimum 8 characters" autocomplete="new-password">
                </div>
                <button type="submit" class="auth-submit" id="submit-btn">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        redirectIfLoggedIn();

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('auth-error');
            const btn = document.getElementById('submit-btn');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await apiFetch('/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({
                        orgName: document.getElementById('orgName').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                if (!res) return;

                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error || 'Signup failed';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }

                // Normalize: signup returns { token, org, user } — merge org.id as orgId
                const user = { ...data.user, orgId: data.org.id };
                saveAuth(data.token, user);
                window.location.href = 'dashboard.html';
            } catch {
                errEl.textContent = 'Network error. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
